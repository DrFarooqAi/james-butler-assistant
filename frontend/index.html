<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>James — Your Personal Butler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <p class="eyebrow">Personal Assistant</p>
    <h1 class="title">James</h1>
    <div class="rule"></div>

    <!-- Butler SVG Avatar -->
    <div class="avatar-wrap" id="avatar">
      <svg width="160" height="200" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Jacket body -->
        <rect x="20" y="155" width="120" height="55" rx="6" fill="#1e1e2e"/>
        <!-- Shirt -->
        <rect x="58" y="155" width="44" height="55" fill="#f0ede8"/>
        <!-- Left lapel -->
        <polygon points="20,155 60,155 50,185" fill="#2a2a3c"/>
        <!-- Right lapel -->
        <polygon points="140,155 100,155 110,185" fill="#2a2a3c"/>
        <!-- Tie -->
        <polygon points="80,157 74,176 80,184 86,176" fill="#7a1f1f"/>
        <!-- Tie knot -->
        <rect x="75" y="154" width="10" height="8" rx="2" fill="#8b2a2a"/>
        <!-- Pocket square -->
        <polygon points="30,162 40,158 43,167 33,169" fill="#8b7355"/>
        <!-- Neck -->
        <rect x="66" y="136" width="28" height="24" rx="5" fill="#f2c89a"/>
        <!-- Left ear -->
        <ellipse cx="36" cy="102" rx="7" ry="10" fill="#efbe90"/>
        <!-- Right ear -->
        <ellipse cx="124" cy="102" rx="7" ry="10" fill="#efbe90"/>
        <!-- Head -->
        <ellipse cx="80" cy="98" rx="46" ry="50" fill="#f5d4a0"/>
        <!-- Hair top -->
        <ellipse cx="80" cy="54" rx="46" ry="18" fill="#2c1a0e"/>
        <!-- Hair side left -->
        <ellipse cx="40" cy="70" rx="10" ry="18" fill="#2c1a0e"/>
        <!-- Hair side right -->
        <ellipse cx="120" cy="70" rx="10" ry="18" fill="#2c1a0e"/>
        <!-- Left eyebrow -->
        <path d="M 53 79 Q 64 73 74 77" stroke="#2c1a0e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Right eyebrow -->
        <path d="M 86 77 Q 96 73 107 79" stroke="#2c1a0e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Left eye white -->
        <ellipse cx="64" cy="91" rx="10" ry="8" fill="white"/>
        <!-- Right eye white -->
        <ellipse cx="96" cy="91" rx="10" ry="8" fill="white"/>
        <!-- Left iris -->
        <circle cx="64" cy="91" r="5.5" fill="#3a2510"/>
        <!-- Right iris -->
        <circle cx="96" cy="91" r="5.5" fill="#3a2510"/>
        <!-- Left pupil -->
        <circle cx="64" cy="91" r="3" fill="#111"/>
        <!-- Right pupil -->
        <circle cx="96" cy="91" r="3" fill="#111"/>
        <!-- Eye shine left -->
        <circle cx="66" cy="89" r="1.4" fill="white"/>
        <!-- Eye shine right -->
        <circle cx="98" cy="89" r="1.4" fill="white"/>
        <!-- Nose -->
        <path d="M 80 103 L 75 115 Q 80 119 85 115 Z" fill="#d9956a" opacity="0.5"/>
        <!-- Smile -->
        <path d="M 67 126 Q 80 136 93 126" stroke="#b06040" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        <!-- Collar left -->
        <polygon points="58,155 70,148 72,160" fill="#f0ede8"/>
        <!-- Collar right -->
        <polygon points="102,155 90,148 88,160" fill="#f0ede8"/>
      </svg>
    </div>

    <div class="reply-box">
      <p class="reply" id="reply">Good day. How may I be of service?</p>
    </div>

    <button class="mic-btn" id="micBtn">🎤 &nbsp;Speak</button>
    <button class="clear-btn" id="clearBtn">Clear Memory</button>
    <p class="status" id="status">Ready</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
